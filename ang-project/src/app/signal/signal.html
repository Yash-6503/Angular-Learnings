<p>signal works!</p>

<p>{{courseName}}</p>

<p>Version : {{version()}}</p>

<p>Duration : {{courseDuration()}}</p>

<button (click)="changeDuration()" >Change Duration</button>

<br>

<p>Cities List : {{cityList}}</p>
<input type="text" [(ngModel)]="cityName" style="background-color: grey; color:white;">
<button style="cursor: pointer;" (click)="addCity(cityName)"  >Add New City</button>


@if(cityList().length > 0){
    <p>Cities List : </p>
    <ul>

        @for (city of cityList(); track city) {
            <li>{{ city }}</li>
        }
    </ul>
}
